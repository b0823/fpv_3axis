<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ExpressLRS Gamepad API Reproduction</title>
<style>
  body{margin:0;padding:20px;background:#111;color:#eee;font:14px/1.5 monospace}
  button{min-height:48px;margin:0 8px 12px 0;padding:10px 14px}
  pre{overflow:auto;padding:14px;background:#000;border:1px solid #555;white-space:pre-wrap}
  .axis{display:grid;grid-template-columns:70px 1fr 80px;gap:8px;align-items:center;margin:8px 0}
  meter{width:100%}
</style>
<h1>Gamepad API axis reproduction</h1>
<p>Move every controller axis through its full range. This page reads only <code>navigator.getGamepads()</code>.</p>
<button id="reset">Reset ranges</button><button id="copy">Copy report</button><button id="download">Download JSON log</button><button id="clear">Clear log</button>
<p id="logStatus">0 input samples recorded</p>
<div id="axes"></div><pre id="report"></pre>
<script>
const minima=[],maxima=[];
const samples=[];
const sampleIntervalMs=50;
let captureStartedAt=performance.now();
let lastSampleAt=-Infinity;
const axes=document.querySelector('#axes');
const report=document.querySelector('#report');
const logStatus=document.querySelector('#logStatus');
document.querySelector('#reset').onclick=()=>{minima.length=0;maxima.length=0};
document.querySelector('#copy').onclick=()=>navigator.clipboard.writeText(report.textContent);
document.querySelector('#clear').onclick=()=>{samples.length=0;captureStartedAt=performance.now();lastSampleAt=-Infinity;updateLogStatus()};
document.querySelector('#download').onclick=()=>{
  const gamepad=[...(navigator.getGamepads?.()??[])].find(Boolean);
  const log={
    capturedAt:new Date().toISOString(),
    userAgent:navigator.userAgent,
    controller:gamepad?{id:gamepad.id,index:gamepad.index,mapping:gamepad.mapping,connected:gamepad.connected}:null,
    sampleIntervalMs,
    samples
  };
  const blob=new Blob([JSON.stringify(log,null,2)],{type:'application/json'});
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob);
  link.download=`gamepad-log-${new Date().toISOString().replace(/[:.]/g,'-')}.json`;
  link.click();
  setTimeout(()=>URL.revokeObjectURL(link.href),1000);
};
function updateLogStatus(){logStatus.textContent=`${samples.length} input samples recorded`}
function frame(){
  const gamepad=[...(navigator.getGamepads?.()??[])].find(Boolean);
  if(!gamepad){report.textContent='No gamepad. Move a stick or press a button.';requestAnimationFrame(frame);return}
  const now=performance.now();
  gamepad.axes.forEach((value,index)=>{
    minima[index]=Math.min(minima[index]??value,value);
    maxima[index]=Math.max(maxima[index]??value,value);
  });
  if(now-lastSampleAt>=sampleIntervalMs){
    samples.push({
      tMs:Math.round(now-captureStartedAt),
      axes:Array.from(gamepad.axes),
      buttons:Array.from(gamepad.buttons,button=>({value:button.value,pressed:button.pressed,touched:button.touched}))
    });
    lastSampleAt=now;
    updateLogStatus();
  }
  axes.innerHTML=gamepad.axes.map((value,index)=>`<div class="axis"><b>axes[${index}]</b><meter min="-1" max="1" value="${value}"></meter><span>${value.toFixed(4)}</span></div>`).join('');
  report.textContent=JSON.stringify({
    userAgent:navigator.userAgent,
    id:gamepad.id,
    index:gamepad.index,
    mapping:gamepad.mapping,
    connected:gamepad.connected,
    axes:gamepad.axes.map((value,index)=>({index,current:value,min:minima[index],max:maxima[index],range:maxima[index]-minima[index]})),
    buttons:gamepad.buttons.map((button,index)=>({index,value:button.value,pressed:button.pressed}))
  },null,2);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
